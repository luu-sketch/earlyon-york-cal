name: refresh-ics

on:
  schedule:
    # 07:00 UTC daily ≈ 03:00 ET — before users open their calendar in the morning
    - cron: "0 7 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - scrape.py
      - requirements.txt
      - .github/workflows/refresh.yml

permissions:
  contents: write

concurrency:
  group: refresh-ics
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python scrape.py

      - name: commit if changed
        run: |
          set -e
          if git diff --quiet -- docs/; then
            echo "no changes"
            exit 0
          fi
          git config user.name  "earlyon-cal-bot"
          git config user.email "earlyon-cal-bot@users.noreply.github.com"
          git add docs/
          git commit -m "refresh ics ($(date -u +%Y-%m-%d))"
          git push
